name: bot cicd flow

on:
  push:
    paths:
      - .github/workflows/bot.yml
      - SpringProject/bot.Dockerfile
      - SpringProject/bot/**
    branches: [ "main", "hw8"]
  pull_request:
    paths:
      - SpringProject/bot/**
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tinkoff-spring/bot

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: maven

      - name: List all files
        run: ls -la

      - name: Build with Maven
        run: |
         cd SpringProject/
         mvn package -pl bot -am

#      - name: List SpringProject/bot
#        run: ls SpringProject/bot
#
#      - name: List SpringProject/bot/target
#        run: ls SpringProject/bot/target/

#      - name: Set up Docker Buildx
#        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -f SpringProject/bot/bot.Dockerfile -t ${{env.IMAGE_NAME}}:latest ./SpringProject/bot/

      - name: Push image
        run: docker push ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest

