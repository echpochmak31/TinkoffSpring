name: bot cicd flow

on:
  push:
    paths:
      - .github/workflows/bot.yml
      - SpringProject/bot/**
    branches: [ "main", "hw8"]
  pull_request:
    paths:
      - SpringProject/bot/**
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: maven
      - name: List all files
        run: ls -la
      - name: Build with Maven
        run: |
         cd SpringProject/
         mvn package -pl bot -am
      - name: Push Docker image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/tinkoff-spring-project
          tags: latest
          registry: docker.io
          dockerfile: scrapper.Dockerfile
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
