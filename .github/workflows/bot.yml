name: bot cicd flow

on:
  push:
    branches: [ "main", "hw8"]
  pull_request:
    paths:
      - 'bot/**'
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: maven
      - name: List all files
        run: ls -la
      - name: Build with Maven
        run: mvn package -e -pl SpringProject/bot -am
